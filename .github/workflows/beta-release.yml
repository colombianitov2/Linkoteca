name: Manual Windows release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:win
      - name: Normalize Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $setup = Get-ChildItem dist -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $setup) { throw "No se genero instalador Windows" }
          $version = node -p "require('./package.json').version"
          $updaterSetupName = "Linkoteca-Setup-$version.exe"
          $blockmap = Get-ChildItem dist -Filter "*Setup*.exe.blockmap" | Select-Object -First 1
          if (-not $blockmap) { throw "No se genero blockmap del instalador" }
          $updaterSetupPath = "release/$updaterSetupName"
          Copy-Item $setup.FullName $updaterSetupPath
          Copy-Item $blockmap.FullName "$updaterSetupPath.blockmap"
          $sha512 = [Convert]::ToBase64String([Security.Cryptography.SHA512]::HashData([IO.File]::ReadAllBytes((Resolve-Path $updaterSetupPath))))
          $size = (Get-Item $updaterSetupPath).Length
          $releaseDate = (Get-Date).ToUniversalTime().ToString("o")
          @"
          version: $version
          files:
            - url: $updaterSetupName
              sha512: $sha512
              size: $size
          path: $updaterSetupName
          sha512: $sha512
          releaseDate: '$releaseDate'
          "@ | Set-Content release/latest.yml -Encoding utf8
      - uses: actions/upload-artifact@v4
        with:
          name: linkoteca-windows
          path: release/*

  release:
    name: Publish GitHub release
    needs: [windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          overwrite_files: true
          files: release/*
