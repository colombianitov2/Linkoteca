name: Beta release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:win
      - name: Normalize Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $setup = Get-ChildItem dist -Filter "*Setup*.exe" | Select-Object -First 1
          $portable = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1
          if (-not $setup) { throw "No se genero instalador Windows" }
          Copy-Item $setup.FullName release/Linkoteca-Windows-Setup.exe
          if ($portable) { Copy-Item $portable.FullName release/Linkoteca-Windows-Portable.exe }
      - uses: actions/upload-artifact@v4
        with:
          name: linkoteca-windows
          path: release/*

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run check
      - run: npx cap sync android
      - run: chmod +x gradlew
        working-directory: android
      - run: ./gradlew assembleDebug
        working-directory: android
      - name: Normalize Android artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/Linkoteca-Android-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: linkoteca-android
          path: release/*

  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx electron-builder --mac dmg zip --publish never
      - name: Normalize macOS artifacts
        shell: bash
        run: |
          mkdir -p release
          dmg="$(find dist -maxdepth 1 -name '*.dmg' | head -n 1)"
          zip="$(find dist -maxdepth 1 -name '*.zip' | head -n 1)"
          test -n "$dmg" || { echo "No se genero DMG"; exit 1; }
          cp "$dmg" release/Linkoteca-macOS.dmg
          if [ -n "$zip" ]; then cp "$zip" release/Linkoteca-macOS.zip; fi
      - uses: actions/upload-artifact@v4
        with:
          name: linkoteca-macos
          path: release/*

  release:
    name: Publish GitHub beta release
    needs: [windows, android, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: release/*
